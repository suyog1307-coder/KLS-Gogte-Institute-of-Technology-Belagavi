[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Redirect all routes to index.html (React Router SPA)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /api calls to your Render backend
# Replace YOUR_RENDER_URL with your actual Render service URL
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR_RENDER_URL.onrender.com/api/:splat"
  status = 200
  force  = true
